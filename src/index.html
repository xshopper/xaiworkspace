<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xAI Workspace Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-user-select: none;
    }
    .setup {
      text-align: center;
      padding: 32px;
      width: 100%;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }
    .logo span { color: #3b82f6; }
    .step {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .progress-track {
      width: 100%;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-bar {
      height: 100%;
      background: #3b82f6;
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .error {
      color: #ef4444;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="setup">
    <div class="logo"><span>xAI</span> Workspace</div>
    <div class="step" id="step">Starting setup...</div>
    <div class="progress-track">
      <div class="progress-bar" id="bar"></div>
    </div>
    <div class="error" id="error"></div>
  </div>
  <script>
    const { listen } = window.__TAURI__.event;

    listen('setup-progress', (event) => {
      const { step, percent } = event.payload;
      document.getElementById('step').textContent = step;
      document.getElementById('bar').style.width = percent + '%';
    });

    listen('setup-error', (event) => {
      const { error } = event.payload;
      document.getElementById('step').textContent = 'Setup failed';
      const el = document.getElementById('error');
      el.textContent = error;
      el.classList.add('show');
    });
  </script>
</body>
</html>
